<ng-container *ngIf="inventorySlots$ | async as slots">
  <div class="hbw-stock-grid-wrapper">
    <div class="hbw-stock-grid__toolbar">
      <button
        type="button"
        class="hbw-stock-grid__mirror-toggle"
        [class.hbw-stock-grid__mirror-toggle--active]="mirrorHorizontal"
        [attr.aria-pressed]="mirrorHorizontal"
        (click)="toggleMirrorHorizontal()"
        i18n="@@hbwStockGridMirrorToggle"
        i18n-title="@@hbwStockGridMirrorHint"
        title="Mirror stock grid left ↔ right. Saved in this browser for demos and camera alignment."
      >
        Mirror layout (left ↔ right)
      </button>
    </div>
    <div class="hbw-stock-grid" [class.hbw-stock-grid--mirrored]="mirrorHorizontal">
      <div class="hbw-stock-grid__corner"></div>
      <div class="hbw-stock-grid__column-label" *ngFor="let column of columnLabels">{{ column }}</div>
      <ng-container *ngFor="let row of ['A', 'B', 'C']; let rowIndex = index">
        <div class="hbw-stock-grid__row-label">{{ row }}</div>
        <ng-container *ngFor="let columnIndex of columnIndices">
          <ng-container *ngIf="slots[rowIndex * 3 + columnIndex] as slot">
            <figure
              [title]="getSlotTooltip(slot)"
              class="hbw-stock-grid__slot"
              [class]="getSlotClass(slot)"
            >
              <img
                [src]="getSlotIcon(slot)"
                [alt]="getSlotLabel(slot)"
                width="96"
                height="96"
                class="hbw-stock-grid__slot-icon"
              />
              <figcaption class="hbw-stock-grid__slot-label">{{ slot.location }}</figcaption>
            </figure>
          </ng-container>
        </ng-container>
      </ng-container>
    </div>
  </div>
</ng-container>
