# Local WebSocket bridge broker for OSF browser clients
# Frontend (OSF): ws://localhost:9001
# Upstream broker: localhost:1883 (existing Mosquitto service)

persistence false
allow_anonymous true
connection_messages true
log_type error
log_type warning
log_type notice

listener 9001
protocol websockets

# Bridge all topics between ws-broker and upstream tcp broker
connection bridge_to_local_tcp
address 127.0.0.1:1883
try_private false
start_type automatic
notifications false
cleansession true

topic # both 0
