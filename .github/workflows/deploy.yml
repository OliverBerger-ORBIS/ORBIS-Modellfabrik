name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    if: >
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.head_branch == 'main')
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Inject Version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          GIT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p osf/apps/osf-ui/src/environments
          cat > osf/apps/osf-ui/src/environments/version.ts << EOF
          export const VERSION = {
            full: '${VERSION}',
            build: 'main-${GIT_HASH}',
            buildDate: '${BUILD_DATE}',
          };
          EOF

      - name: Build OSF (All Locales)
        run: npx nx build osf-ui --configuration=github-pages

      - name: Prepare deployment
        run: |
          mkdir -p _site
          cp -r dist/apps/osf-ui/browser/* _site/
          # Fixtures at root so app can load /ORBIS-Modellfabrik/fixtures/... (used by Mock/Process tab)
          cp -r dist/apps/osf-ui/browser/en/fixtures _site/fixtures

          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=/ORBIS-Modellfabrik/en/">
            <title>Redirecting...</title>
          </head><body>
            <p>Redirecting to <a href="/ORBIS-Modellfabrik/en/">English version</a>...</p>
          </body></html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: >
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.head_branch == 'main')
      }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4